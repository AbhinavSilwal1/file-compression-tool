{% extends "base.html" %}

{% block content %}

<div class="hero-card">
    <h1>File Compression Tool</h1>

    <p class="subtitle">
        Compress and decompress text files using Huffman Coding.
    </p>

    <div class="section-divider"></div>

    <h2>Compress File</h2>

    <p class="supported-formats">
        Supported formats:
        <span>.txt</span>, <span>.md</span>, <span>.json</span>, <span>.csv</span>, <span>.log</span>
    </p>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Compress</button>
    </form>

    <div class="section-divider"></div>

    <h2>Decompress File</h2>

    <p class="supported-formats">
        Supported format:
        <span>.huff</span>
    </p>

    <form action="/decompress" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Decompress</button>
    </form>
</div>

{% endblock %}
